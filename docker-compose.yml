version: '3.8'

services:
  quantum-engine:
    image: python:3.11-slim
    container_name: quantum-engine
    volumes:
      - ./src:/app
    working_dir: /app
    environment:
      - IBM_QUANTUM_TOKEN=${IBM_QUANTUM_TOKEN}
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python main.py"
