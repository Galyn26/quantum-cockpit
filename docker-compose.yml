version: '3.8'

services:
  quantum-engine:
    image: python:3.11-slim
    container_name: quantum-engine
    volumes:
      - ./src:/app
      # 📥 This line caches your python libraries on your disk so they never delete!
      - pip_cache:/usr/local/lib/python3.11/site-packages
    working_dir: /app
    environment:
      - IBM_QUANTUM_TOKEN=${IBM_QUANTUM_TOKEN}
    command: >
      sh -c "pip install -r requirements.txt &&
             python ingest_medmnist.py &&
             python main.py &&
             python quantum_classifier.py"

# Declare the persistent volume storage at the bottom of the file
volumes:
  pip_cache:
